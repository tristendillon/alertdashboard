packages:
  - apps/*
  - packages/*

# Versions shared across apps live here; package.jsons reference them as "catalog:".
catalog:
  typescript: ^6.0.3
  eslint: ^10.6.0
  zod: ^4.4.3
  convex: ^1.42.1
  convex-helpers: ^0.1.120
  "@types/node": ^26.1.0

overrides:
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3

allowBuilds:
  esbuild: true
  workerd: true
  "@clerk/shared": false
  "@tailwindcss/oxide": false
  sharp: false
  unrs-resolver: false
  bufferutil: false
  core-js: false
  utf-8-validate: false

minimumReleaseAgeExclude:
  - miniflare@4.20260701.0
  - wrangler@4.107.0

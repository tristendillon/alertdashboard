name: Deploy Listener

on:
  push:
    branches: ['main']
    paths:
      - 'apps/firstdue-listener/**'
      - 'apps/convex/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
  pull_request:
    branches: ['main']
    paths:
      - 'apps/firstdue-listener/**'
      - 'apps/convex/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: deploy-listener
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and lint
        run: pnpm turbo run typecheck lint --filter=@sizeupdashboard/firstdue-listener

      # The runner's Docker builds the container image during cf:deploy.
      - name: Deploy to Cloudflare
        if: github.event_name != 'pull_request'
        working-directory: apps/firstdue-listener
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @sizeupdashboard/firstdue-listener cf:deploy

      - name: Sync Worker secrets
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FIRSTDUE_API_KEY: ${{ secrets.FIRSTDUE_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          CONVEX_API_KEY: ${{ secrets.CONVEX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # Build the secrets JSON safely (jq handles escaping); wrangler secret bulk
          # reads a flat { "NAME": "value" } JSON file.
          jq -n \
            --arg firstdue "$FIRSTDUE_API_KEY" \
            --arg weather "$WEATHER_API_KEY" \
            --arg convex "$CONVEX_API_KEY" \
            --arg apikey "$API_KEY" \
            '{FIRSTDUE_API_KEY: $firstdue, WEATHER_API_KEY: $weather, CONVEX_API_KEY: $convex, API_KEY: $apikey}' \
            > /tmp/listener-secrets.json
          pnpm --filter @sizeupdashboard/firstdue-listener exec wrangler secret bulk /tmp/listener-secrets.json
          rm -f /tmp/listener-secrets.json

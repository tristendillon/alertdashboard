name: Deploy Web

on:
  push:
    branches: ['main']
    paths:
      - 'apps/web/**'
      - 'apps/convex/src/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy to Cloudflare Workers
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Runtime server secrets (nodejs_compat exposes these via process.env at build).
          CONVEX_API_KEY: ${{ secrets.CONVEX_API_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          # NEXT_PUBLIC_* are inlined into the client bundle at build time.
          NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_MAP_ID: ${{ vars.NEXT_PUBLIC_MAP_ID }}
          NEXT_PUBLIC_DB_TIMEZONE: ${{ vars.NEXT_PUBLIC_DB_TIMEZONE }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_LOG_VERBOSE: ${{ vars.NEXT_PUBLIC_LOG_VERBOSE }}
        run: pnpm run deploy

      # Keep the Worker's runtime secrets in sync with GitHub (single source of
      # truth). `secret bulk` re-rolls the deployed version with the new values.
      - name: Sync Worker runtime secrets
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          jq -n \
            --arg convex "${{ secrets.CONVEX_API_KEY }}" \
            --arg clerk "${{ secrets.CLERK_SECRET_KEY }}" \
            '{ CONVEX_API_KEY: $convex, CLERK_SECRET_KEY: $clerk }' > /tmp/web-secrets.json
          pnpm exec wrangler secret bulk /tmp/web-secrets.json
          rm -f /tmp/web-secrets.json

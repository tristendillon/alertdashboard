name: Infra (OpenTofu)

on:
  pull_request:
    branches: ['main']
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  push:
    branches: ['main']
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

# Serialize all runs that touch the shared R2 state.
concurrency:
  group: infra-tofu
  cancel-in-progress: false

env:
  TOFU_VERSION: '1.12.3'

defaults:
  run:
    working-directory: infra

jobs:
  # Credential-free checks — run on every PR, including forks.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Format check
        run: tofu fmt -check -recursive

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # Plan against real state on PRs (same-repo only — forks don't get secrets).
  plan:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Init (R2 backend)
        run: |
          cat > backend.generated.hcl <<EOF
          endpoints = { s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" }
          EOF
          tofu init -backend-config=backend.generated.hcl

      - name: Plan
        run: tofu plan -no-color -input=false

  # Apply on merge to main (and manual dispatch).
  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Init (R2 backend)
        run: |
          cat > backend.generated.hcl <<EOF
          endpoints = { s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" }
          EOF
          tofu init -backend-config=backend.generated.hcl

      - name: Plan
        run: tofu plan -no-color -input=false -out=tfplan

      - name: Apply
        run: tofu apply -no-color -input=false tfplan

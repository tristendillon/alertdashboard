name: Infra (OpenTofu)

on:
  pull_request:
    branches: ['main']
    paths:
      - 'infra/**'
      - 'deploy.config.json'
      - '.github/workflows/deploy-infra.yml'
  push:
    branches: ['main']
    paths:
      - 'infra/**'
      - 'deploy.config.json'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

# Serialize all runs that touch the shared R2 state.
concurrency:
  group: infra-tofu
  cancel-in-progress: false

env:
  TOFU_VERSION: '1.12.3'

defaults:
  run:
    working-directory: infra

jobs:
  # Credential-free checks — run on every PR, including forks.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Format check
        run: tofu fmt -check -recursive

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # Plan against real state on PRs (same-repo only — forks don't get secrets).
  plan:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      # Everything below is derived from CLOUDFLARE_API_TOKEN — no other secrets:
      #  - account id: from the zone (GET /zones?name=..., Zone Read scope)
      #  - R2 state creds: access key = the token's own id (tokens/verify),
      #    secret = sha256 hex of the token value (documented R2 S3-API derivation).
      #    Requires the token to carry the "Workers R2 Storage: Edit" scope.
      - name: Derive account id and R2 state credentials
        run: |
          set -euo pipefail
          zone_name=$(jq -er .zoneName ../deploy.config.json)
          account_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=${zone_name}" \
            | jq -er '.result[0].account.id')
          token_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify | jq -er '.result.id' \
            || curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${account_id}/tokens/verify" | jq -er '.result.id')
          secret=$(printf %s "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$secret"
          {
            echo "AWS_ACCESS_KEY_ID=$token_id"
            echo "AWS_SECRET_ACCESS_KEY=$secret"
            echo "TF_VAR_account_id=$account_id"
            echo "R2_ENDPOINT=https://${account_id}.r2.cloudflarestorage.com"
          } >> "$GITHUB_ENV"

      - name: Init (R2 backend)
        run: |
          printf 'endpoints = { s3 = "%s" }\n' "$R2_ENDPOINT" > backend.generated.hcl
          tofu init -backend-config=backend.generated.hcl

      - name: Plan
        run: tofu plan -no-color -input=false

  # Apply on merge to main (and manual dispatch).
  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Derive account id and R2 state credentials
        run: |
          set -euo pipefail
          zone_name=$(jq -er .zoneName ../deploy.config.json)
          account_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=${zone_name}" \
            | jq -er '.result[0].account.id')
          token_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify | jq -er '.result.id' \
            || curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${account_id}/tokens/verify" | jq -er '.result.id')
          secret=$(printf %s "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$secret"
          {
            echo "AWS_ACCESS_KEY_ID=$token_id"
            echo "AWS_SECRET_ACCESS_KEY=$secret"
            echo "TF_VAR_account_id=$account_id"
            echo "R2_ENDPOINT=https://${account_id}.r2.cloudflarestorage.com"
          } >> "$GITHUB_ENV"

      - name: Init (R2 backend)
        run: |
          printf 'endpoints = { s3 = "%s" }\n' "$R2_ENDPOINT" > backend.generated.hcl
          tofu init -backend-config=backend.generated.hcl

      - name: Plan
        run: tofu plan -no-color -input=false -out=tfplan

      - name: Apply
        run: tofu apply -no-color -input=false tfplan

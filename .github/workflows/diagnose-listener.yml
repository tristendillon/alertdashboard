name: Diagnose listener containers

on:
  workflow_dispatch:
    inputs:
      delete_application:
        description: 'DELETE the stuck containers application (a redeploy recreates it)'
        type: boolean
        default: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Derive account id
        run: |
          set -euo pipefail
          zone_name=$(jq -er .zoneName deploy.config.json)
          account_id=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=${zone_name}" \
            | jq -er '.result[0].account.id')
          echo "CLOUDFLARE_ACCOUNT_ID=$account_id" >> "$GITHUB_ENV"
      - name: Containers overview
        working-directory: apps/firstdue-listener
        run: |
          echo "=== containers list ==="
          pnpm exec wrangler containers list || true
          echo "=== images list ==="
          pnpm exec wrangler containers images list || true
      - name: Application detail via API
        run: |
          set -euo pipefail
          curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications" \
            | jq '.result[] | {name, id, instances, max_instances, version, scheduling_policy, health: .health, rollouts: (.rollouts // [] | map({id, status, step_states: (.step_states // "n/a")}))}' || \
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications" | head -c 4000
      - name: Container info and instance detail
        working-directory: apps/firstdue-listener
        run: |
          APP_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications" \
            | jq -er '.result[0].id')
          echo "=== wrangler containers info ==="
          pnpm exec wrangler containers info "$APP_ID" || true
          echo "=== instances endpoint ==="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications/${APP_ID}/instances" | head -c 4000
          echo
          echo "=== deployments endpoint ==="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications/${APP_ID}/deployments" | head -c 4000
      # Recovery for a wedged rollout (instances stuck 'starting', config pinned to
      # an old image): delete the application; the next `wrangler deploy` recreates
      # it cleanly on the current image. The listener is stateless (data in Convex).
      - name: Delete stuck containers application
        if: inputs.delete_application == true
        working-directory: apps/firstdue-listener
        run: |
          set -euo pipefail
          APP_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications" \
            | jq -er '.result[0].id')
          echo "Deleting containers application $APP_ID"
          pnpm exec wrangler containers delete "$APP_ID" || \
            curl -sf -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/containers/applications/${APP_ID}"
          echo "Deleted. Redeploy the listener to recreate it."
